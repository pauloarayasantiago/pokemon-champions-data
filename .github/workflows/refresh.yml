name: Refresh competitive data

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies (root)
        run: npm ci

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml youtube-transcript-api

      - name: Scrape Pikalytics
        run: python scraper_pikalytics.py
        continue-on-error: true

      - name: Scrape Google Sheets tournament teams
        run: python scraper_sheets.py
        continue-on-error: true

      - name: Rebuild vector index
        run: npx tsx scripts/index-data.ts

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "refresh: auto-update competitive data"
            git push
          fi
